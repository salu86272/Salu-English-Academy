<!DOCTYPE html>
<html>
<head>
<title>Salu App - Day 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#eef2f7;}
.box{width:300px;margin:50px auto;background:white;padding:20px;border-radius:10px;}
input{width:100%;padding:10px;margin:5px 0;}
button{width:100%;padding:10px;margin-top:5px;background:blue;color:white;border:none;}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h3>Login</h3>
<input id="lmobile" placeholder="Mobile">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="showRegister()">Register</button>
</div>

<div class="box" id="registerBox" style="display:none;">
<h3>Register</h3>
<input id="rname" placeholder="Name">
<input id="rmobile" placeholder="Mobile">
<input id="rpass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>
<button onclick="showLogin()">Back</button>
</div>

<div class="box" id="dashboard" style="display:none;">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 YOUR REAL CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyDL7EqGc9GY1xAWLtBHLPAIZomnps82c1Y",
  authDomain: "salu-english-academy.firebaseapp.com",
  projectId: "salu-english-academy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// REGISTER
function register(){
  var name = rname.value;
  var mobile = rmobile.value;
  var pass = rpass.value;

  firebase.auth().createUserWithEmailAndPassword(
    mobile+"@salu.com", pass
  ).then(res=>{

    db.collection("users").doc(res.user.uid).set({
      name:name,
      mobile:mobile
    });

    alert("Account Created ✅");
    showLogin();

  }).catch(err=>{
    alert(err.message);
  });
}

// LOGIN
function login(){

  firebase.auth().signInWithEmailAndPassword(
    lmobile.value+"@salu.com", lpass.value
  ).then(res=>{

    db.collection("users").doc(res.user.uid).get()
    .then(doc=>{
      welcome.innerText = "Welcome " + doc.data().name;
      loginBox.style.display="none";
      dashboard.style.display="block";
    });

  }).catch(err=>{
    alert("Login Failed ❌");
  });

}

// UI
function showRegister(){
  loginBox.style.display="none";
  registerBox.style.display="block";
}

function showLogin(){
  registerBox.style.display="none";
  loginBox.style.display="block";
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
