<!DOCTYPE html>
<html>

<head>
<title>Salu English Academy System</title>

<style>
body { font-family: Arial; background:#f0f2f5; }
h1 { text-align:center; }

form {
  width:650px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:green;
  color:white;
  border:none;
}

table {
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
}

th, td {
  border:1px solid black;
  padding:6px;
  font-size:12px;
}

th { background:black; color:white; }

#receipt, #idcard {
  display:none;
  border:2px solid black;
  padding:15px;
  width:320px;
  margin:20px auto;
  background:white;
}
</style>

</head>

<body>

<h1>Student Admission System</h1>

<form>

<input type="text" id="name" placeholder="Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="mother" placeholder="Mother Name">
<input type="date" id="dob">

<input type="text" id="aadhaar" placeholder="Aadhaar">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="text" id="address" placeholder="Address">
<input type="text" id="mobile" placeholder="Mobile">
<input type="email" id="email" placeholder="Email">

<select id="status">
<option value="">Status</option>
<option>Student</option>
<option>Job</option>
<option>Unemployed</option>
</select>

<input type="text" id="profession" placeholder="Profession">
<input type="text" id="className" placeholder="Class">

<select id="course">
<option value="">Course</option>
<option>Spoken English</option>
<option>Math</option>
<option>Science</option>
</select>

<button type="button" onclick="saveData()">Save</button>

</form>

<table id="table"></table>

<!-- Receipt -->
<div id="receipt">
<h3>Receipt</h3>
<p>Name: <span id="r_name"></span></p>
<p>Mobile: <span id="r_mobile"></span></p>
<p>Course: <span id="r_course"></span></p>
<p>Status: <span id="r_status"></span></p>
</div>

<!-- ID Card -->
<div id="idcard">
<h3>ID CARD</h3>
<p id="id_name"></p>
<p id="id_course"></p>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 आपका Firebase config
var firebaseConfig = {
  apiKey: "AIzaSyDL7EqGc9GY1xAWLtBHLPAIZomnps82c1Y",
  authDomain: "salu-english-academy.firebaseapp.com",
  projectId: "salu-english-academy",
  storageBucket: "salu-english-academy.firebasestorage.app",
  messagingSenderId: "371798289665",
  appId: "1:371798289665:web:2b724debe8ffd6d0ca3f00"
};

// Initialize
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();


// SAVE DATA
function saveData() {

  var data = {
    name: document.getElementById("name").value,
    mobile: document.getElementById("mobile").value,
    course: document.getElementById("course").value,
    status: document.getElementById("status").value
  };

  if(data.name == "" || data.mobile.length != 10) {
    alert("Valid data dalo ❌"); return;
  }

  db.collection("students").add(data)
  .then(() => {
    alert("Saved ✅");
    showData();
    showReceipt(data);
    showID(data);
  });

}


// SHOW DATA
function showData() {

  var table = document.getElementById("table");

  table.innerHTML = `
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Status</th>
<th>Course</th>
</tr>`;

  db.collection("students").get().then((res) => {
    res.forEach((doc) => {
      var s = doc.data();

      table.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${s.mobile}</td>
<td>${s.status}</td>
<td>${s.course}</td>
</tr>`;
    });
  });

}


// RECEIPT
function showReceipt(data) {
  document.getElementById("receipt").style.display = "block";
  r_name.innerText = data.name;
  r_mobile.innerText = data.mobile;
  r_course.innerText = data.course;
  r_status.innerText = data.status;
}


// ID CARD
function showID(data) {
  document.getElementById("idcard").style.display = "block";
  id_name.innerText = "Name: " + data.name;
  id_course.innerText = "Course: " + data.course;
}


// LOAD DATA
showData();

</script>

</body>
</html>
