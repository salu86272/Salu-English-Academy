<!DOCTYPE html>
<html>

<head>
<title>Salu Cloud System</title>

<style>
body { font-family: Arial; background:#eef2f5; text-align:center; }

.box {
  width:320px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  background:green;
  color:white;
  border:none;
  cursor:pointer;
}

.hidden { display:none; }

table {
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
}

th, td {
  border:1px solid black;
  padding:6px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Name">
<input type="text" id="mobile" placeholder="Mobile">

<select id="coaching">
<option value="">Select Coaching</option>
<option>Salu English Academy</option>
<option>Bright Future</option>
<option>Success Coaching</option>
</select>

<button onclick="login()">Enter</button>
</div>


<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h2>Dashboard</h2>

<button onclick="showSection('admission')">New Admission</button>
<button onclick="showSection('fee')">Fee</button>
<button onclick="showSection('attendance')">Attendance</button>
<button onclick="showSection('team')">Team</button>
<button onclick="showSection('profile')">Profile</button>

</div>


<!-- ADMISSION -->
<div id="admission" class="hidden box">
<h3>New Admission</h3>
<input type="text" id="sname" placeholder="Student Name">
<input type="text" id="course" placeholder="Course">
<input type="number" id="feeAmount" placeholder="Fee">

<button onclick="saveStudent()">Save</button>
</div>


<!-- FEE -->
<div id="fee" class="hidden box">
<h3>Total Fee</h3>
<p id="totalFee"></p>
</div>


<!-- ATTENDANCE -->
<div id="attendance" class="hidden box">
<h3>Attendance</h3>
<button onclick="markAttendance()">Mark</button>
<p id="attendanceCount"></p>
</div>


<!-- TEAM -->
<div id="team" class="hidden box">
<h3>Team + Income</h3>
<p id="teamData"></p>
</div>


<!-- PROFILE -->
<div id="profile" class="hidden box">
<h3>ID Card</h3>
<p id="profileData"></p>
</div>


<table id="table"></table>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 आपका Firebase config (already correct)
var firebaseConfig = {
  apiKey: "AIzaSyDL7EqGc9GY1xAWLtBHLPAIZomnps82c1Y",
  authDomain: "salu-english-academy.firebaseapp.com",
  projectId: "salu-english-academy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var currentUser = {};


// LOGIN
function login() {

  var name = username.value;
  var mobile = mobile.value;
  var coaching = coaching.value;

  if(name=="" || mobile=="" || coaching=="") {
    alert("Fill all ❌"); return;
  }

  currentUser = {name, mobile, coaching};

  loginBox.style.display="none";
  dashboard.style.display="block";

}


// SHOW SECTION
function showSection(id) {

  document.querySelectorAll(".box").forEach(x=>x.classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");

  loadData();
}


// SAVE STUDENT (🔥 Firebase)
function saveStudent() {

  var data = {
    name: sname.value,
    course: course.value,
    fee: Number(feeAmount.value),
    coaching: currentUser.coaching
  };

  if(data.name=="") {
    alert("Name required ❌"); return;
  }

  db.collection("students").add(data)
  .then(()=>{
    alert("Saved Online ✅");
    loadData();
  });

}


// LOAD DATA (🔥 coaching wise filter)
function loadData() {

  var table = document.getElementById("table");

  table.innerHTML = `
<tr>
<th>Name</th>
<th>Course</th>
<th>Fee</th>
</tr>`;

  var total = 0;
  var count = 0;

  db.collection("students")
  .where("coaching","==",currentUser.coaching)
  .get()
  .then((res)=>{

    res.forEach((doc)=>{

      var s = doc.data();

      total += s.fee;
      count++;

      table.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${s.course}</td>
<td>${s.fee}</td>
</tr>`;
    });

    totalFee.innerText = "Total Fee: ₹"+total;
    teamData.innerText = "Students: "+count+" | Income: ₹"+total;

  });

}


// ATTENDANCE (Firebase)
function markAttendance() {

  db.collection("attendance").add({
    coaching: currentUser.coaching,
    date: new Date().toDateString()
  });

  attendanceCount.innerText = "Marked ✅";
}


// PROFILE
function loadProfile() {

  profileData.innerText =
    currentUser.name+" | "+currentUser.mobile+" | "+currentUser.coaching;

}

</script>

</body>
</html>
